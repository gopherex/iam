openapi: 3.1.0
info:
  title: IAM — Authentication & Identity API
  version: 1.0.0
  summary: Headless authentication & identity server.
  description: "The IAM HTTP API. IAM owns identity and authentication only: users,\ncredentials, sessions\
    \ and tokens, and federation. It emits domain events\nvia a transactional outbox; anything beyond\
    \ identity is out of scope.\n\nNamespaces:\n  - `/mgmt/v1/...`            operator (master key)\n\
    \  - `/v1/projects/{project_id}/admin/...`  project admin\n  - `/v1/...`                 runtime (project/env\
    \ resolved from `X-Client-Id`)\n  - `/oauth2/...`, `/p/{project_id}/e/{env}/.well-known/...`  OAuth/OIDC\
    \ provider\n\nErrors use a single envelope with a stable machine `code`; branch on `code`,\nnever\
    \ on the localized `message`.\n"
  license:
    name: Proprietary
  contact:
    name: IAM API
servers:
- url: https://auth.example.com
  description: Deployment base URL
tags:
- name: System
  description: Health, discovery, public config, CSRF.
  x-feature: platform
- name: Core Auth
  description: Sign-up, sign-in, refresh, exchange, sign-out, session, step-up, guest.
  x-feature: core-auth
- name: Verification
  description: Email and phone verification and change.
  x-feature: core-auth
  x-depends-on:
  - Core Auth
- name: Passwordless
  description: OTP and magic-link authentication.
  x-feature: passwordless
- name: OAuth Social
  description: Social login as an OAuth client; identity linking.
  x-feature: oauth-social
- name: WebAuthn
  description: Passkey login/registration and credential management.
  x-feature: webauthn
- name: MFA
  description: MFA factors, challenge/verify, recovery codes.
  x-feature: mfa
  x-depends-on:
  - Core Auth
- name: Password
  description: Forgot/reset/change/verify/check.
  x-feature: core-auth
  x-depends-on:
  - Core Auth
- name: Users
  description: Current-user identity, activity, export, capabilities.
  x-feature: account
- name: Identities
  description: Linked identities and merge.
  x-feature: account
  x-depends-on:
  - Users
- name: Sessions
  description: Session and device management.
  x-feature: account
  x-depends-on:
  - Users
- name: Service Accounts
  description: Machine identities and token minting.
  x-feature: machine-identity
- name: API Keys
  description: Static scoped credentials.
  x-feature: machine-identity
- name: Tokens
  description: Runtime token introspection, verification, revocation.
  x-feature: core-auth
- name: Enterprise SSO
  description: SAML/OIDC connections and runtime.
  x-feature: federation
- name: SCIM
  description: SCIM 2.0 identity provisioning.
  x-feature: federation
  x-depends-on:
  - Enterprise SSO
- name: Domains
  description: Verified domains.
  x-feature: federation
  x-depends-on:
  - Enterprise SSO
- name: OIDC Provider
  description: OAuth 2.0 / OpenID Connect provider endpoints.
  x-feature: oidc-provider
- name: OIDC Interaction
  description: Headless login/consent interaction and OAuth grants.
  x-feature: oidc-provider
  x-depends-on:
  - OIDC Provider
- name: Device Flow
  description: Device authorization grant.
  x-feature: oidc-provider
  x-depends-on:
  - OIDC Provider
- name: Admin Users
  description: Project-admin user management.
  x-feature: admin
- name: Admin Apps
  description: App-client management.
  x-feature: admin
- name: Admin Config
  description: Auth, policy, provider, template, feature configuration.
  x-feature: admin
- name: Admin Webhooks & Hooks
  description: Webhooks, deliveries, events, blocking hooks.
  x-feature: admin
- name: Admin Keys
  description: Signing keys, token profiles, token runtime.
  x-feature: admin
- name: Admin Jobs
  description: Background jobs, import, export, audit.
  x-feature: admin
- name: Admin Risk
  description: Captcha, risk, rate limits, blocks.
  x-feature: admin
- name: Test Mode
  description: 'Test-environment controls: clock, seed, reset, captured messages.'
  x-feature: admin
- name: Management
  description: Operator project & environment provisioning.
  x-feature: operator
