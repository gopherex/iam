x-features:
  platform:
    description: Health, discovery, public bootstrap config.
    tags:
    - System
    requires: []
  core-auth:
    description: Primary sign-up/sign-in, sessions, password & email/phone verification lifecycle.
    tags:
    - Core Auth
    - Verification
    - Password
    - Tokens
    requires: []
  passwordless:
    description: OTP and magic-link authentication (alternative primary method).
    tags:
    - Passwordless
    requires: []
  oauth-social:
    description: Social login as an OAuth client and identity linking.
    tags:
    - OAuth Social
    requires: []
  webauthn:
    description: Passkey login, registration and credential management.
    tags:
    - WebAuthn
    requires: []
  mfa:
    description: Second-factor enrollment and challenge; layered on a primary method.
    tags:
    - MFA
    requires:
    - core-auth
  account:
    description: Self-service user profile, linked identities and session/device management.
    tags:
    - Users
    - Identities
    - Sessions
    requires: []
  machine-identity:
    description: Service accounts and API keys for server-to-server auth.
    tags:
    - Service Accounts
    - API Keys
    requires: []
  federation:
    description: Enterprise SSO connections, SCIM provisioning and verified domains; SCIM and Domains
      are meaningless without an SSO connection.
    tags:
    - Enterprise SSO
    - SCIM
    - Domains
    requires: []
  oidc-provider:
    description: IAM as an OAuth2/OIDC provider; interaction and device-flow exist only to drive the provider.
    tags:
    - OIDC Provider
    - OIDC Interaction
    - Device Flow
    requires: []
  admin:
    description: 'Per-project administration: users, app clients, policy/config, webhooks, keys, jobs,
      risk.'
    tags:
    - Admin Users
    - Admin Apps
    - Admin Config
    - Admin Webhooks & Hooks
    - Admin Keys
    - Admin Jobs
    - Admin Risk
    - Test Mode
    requires: []
  operator:
    description: Operator provisioning of projects and environments.
    tags:
    - Management
    requires: []
x-filter-planes:
  description: Orthogonal axes this API can be sliced by. Each is queryable from a spec field without
    URL heuristics.
  planes:
  - id: tag
    kind: taxonomy
    source: operation.tags
    values: 27
  - id: tag-group
    kind: taxonomy
    source: x-tagGroups (tag -> group)
    values: 8
  - id: feature
    kind: taxonomy
    source: tag.x-feature / x-features
    values: 12
  - id: audience
    kind: access
    source: operation.x-audience
    values: 5
    enum:
    - runtime
    - project-admin
    - operator
    - scim
    - oidc-provider
  - id: credential
    kind: access
    source: operation.security (scheme) / [] = public
    values: 8
  - id: method
    kind: operation
    source: HTTP verb
    values: 5
  - id: project
    kind: scope
    source: operation.x-scopes contains 'project'
  - id: environment
    kind: scope
    source: operation.x-scopes contains 'environment'
  - id: content-type
    kind: protocol
    source: request/response content media-type
    values: 5
  - id: since
    kind: lifecycle
    source: operation.x-since
    values: 7
    enum:
    - 1.0.0
    - 1.1.0
    - 1.2.0
    - 1.3.0
    - 1.4.0
    - 2.0.0
    - 3.0.0
security:
- bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Bearer token. The concrete credential depends on the namespace:

        user access token, service token / API key, project-admin token,

        master key, or SCIM token.

        '
    masterKey:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Operator master key (or operator-scoped credential).
    adminToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Project-admin token.
    serviceToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Service-account token or API key.
    scimToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Per-connection SCIM bearer token.
    clientSecretBasic:
      type: http
      scheme: basic
      description: OAuth client auth (client_secret_basic); client_secret_post / private_key_jwt also
        accepted in body.
    oauth2:
      type: oauth2
      description: IAM as OAuth 2.0 / OIDC provider.
      flows:
        authorizationCode:
          authorizationUrl: /oauth2/authorize
          tokenUrl: /oauth2/token
          scopes:
            openid: OpenID Connect
            profile: Profile
            email: Email
        clientCredentials:
          tokenUrl: /oauth2/token
          scopes: {}
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        example: prj_7Fk2
    XEnvironment:
      name: X-Environment
      in: header
      required: false
      schema:
        type: string
        example: live
      description: Selects the environment for admin calls.
    XClientId:
      name: X-Client-Id
      in: header
      required: true
      schema:
        type: string
        example: app_web
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Optional key to safely retry a create without duplicating it.
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated but not permitted.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found (or not visible).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Conflicting state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnprocessableEntity:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: Rate limited.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait.
        RateLimit-Limit:
          schema:
            type: integer
        RateLimit-Remaining:
          schema:
            type: integer
        RateLimit-Reset:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServiceUnavailable:
      description: Service unavailable; dependencies unreachable.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Stable machine-readable code. Branch on this.
              example: invalid_credentials
            message:
              type: string
              description: Localized human-readable message.
            request_id:
              type: string
            details:
              type:
              - object
              - 'null'
              additionalProperties: true
    Ok:
      type: object
      properties:
        ok:
          type: boolean
          example: true
    Timestamp:
      type: string
      format: date-time
      example: '2026-06-04T09:00:00Z'
    UserKind:
      type: string
      enum:
      - human
      - guest
      - system
    UserStatus:
      type: string
      enum:
      - active
      - suspended
      - banned
      - deactivated
    CoreProfile:
      type: object
      properties:
        name:
          type:
          - string
          - 'null'
        avatar_url:
          type:
          - string
          - 'null'
        locale:
          type: string
          example: en
    User:
      type: object
      required:
      - id
      - kind
      - status
      properties:
        id:
          type: string
          example: usr_9aQ2
        kind:
          $ref: '#/components/schemas/UserKind'
        status:
          $ref: '#/components/schemas/UserStatus'
        primary_email:
          type:
          - string
          - 'null'
        email_verified:
          type: boolean
        primary_phone:
          type:
          - string
          - 'null'
        phone_verified:
          type: boolean
        profile:
          $ref: '#/components/schemas/CoreProfile'
        metadata:
          type: object
          additionalProperties: true
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
    Identity:
      type: object
      required:
      - id
      - type
      properties:
        id:
          type: string
          example: idn_b2
        type:
          type: string
          enum:
          - password
          - oauth
          - saml
          - oidc
          - passkey
        provider:
          type:
          - string
          - 'null'
        provider_account_id:
          type:
          - string
          - 'null'
        email:
          type:
          - string
          - 'null'
        created_at:
          $ref: '#/components/schemas/Timestamp'
    Session:
      type: object
      required:
      - id
      properties:
        id:
          type: string
          example: sess_4t
        user_id:
          type: string
        client_id:
          type: string
        device_name:
          type:
          - string
          - 'null'
        amr:
          type: array
          items:
            type: string
        aal:
          type: integer
          enum:
          - 1
          - 2
        trusted:
          type: boolean
        current:
          type: boolean
        created_at:
          $ref: '#/components/schemas/Timestamp'
        last_active_at:
          $ref: '#/components/schemas/Timestamp'
    SessionTokens:
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      properties:
        access_token:
          type: string
          example: eyJ…
        refresh_token:
          type: string
          example: rt_…
        expires_in:
          type: integer
          example: 1800
        token_type:
          type: string
          example: Bearer
    NextStep:
      type:
      - string
      - 'null'
      enum:
      - verify_email
      - verify_phone
      - mfa_required
      - step_up
      - reconsent_required
      - signup_required
      - null
    Factor:
      type: object
      properties:
        id:
          type: string
          example: fac_totp
        type:
          type: string
          enum:
          - totp
          - sms
          - email
          - webauthn
        status:
          type: string
          enum:
          - pending
          - active
        hint:
          type:
          - string
          - 'null'
    AuthResult:
      type: object
      required:
      - result_type
      - user
      - session
      properties:
        result_type:
          type: string
          enum:
          - authenticated
          description: Discriminates the auth response variant.
        user:
          $ref: '#/components/schemas/User'
        session:
          $ref: '#/components/schemas/SessionTokens'
        next_step:
          $ref: '#/components/schemas/NextStep'
    AuthNextStep:
      type: object
      required:
      - result_type
      - next_step
      properties:
        result_type:
          type: string
          enum:
          - next_step
          description: Discriminates the auth response variant.
        next_step:
          $ref: '#/components/schemas/NextStep'
        flow_token:
          type: string
          example: flw_…
        factors:
          type: array
          items:
            $ref: '#/components/schemas/Factor'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/ConsentDocRef'
    AuthResultOrNextStep:
      oneOf:
      - $ref: '#/components/schemas/AuthResult'
      - $ref: '#/components/schemas/AuthNextStep'
      discriminator:
        propertyName: result_type
        mapping:
          authenticated: '#/components/schemas/AuthResult'
          next_step: '#/components/schemas/AuthNextStep'
    Challenge:
      type: object
      required:
      - challenge_id
      - expires_at
      properties:
        challenge_id:
          type: string
          example: chl_e1
        expires_at:
          $ref: '#/components/schemas/Timestamp'
        type:
          type: string
    ConsentDocRef:
      type: object
      properties:
        key:
          type: string
          example: tos
        version:
          type: string
          example: '2026-06-01'
        url:
          type:
          - string
          - 'null'
    ConsentAcceptance:
      type: object
      required:
      - key
      - version
      properties:
        key:
          type: string
        version:
          type: string
    PageMeta:
      type: object
      properties:
        next_cursor:
          type:
          - string
          - 'null'
        has_more:
          type: boolean
    AppClient:
      type: object
      properties:
        id:
          type: string
          example: app_web
        name:
          type: string
        type:
          type: string
          enum:
          - spa
          - native
          - web
          - machine
        environment:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        allowed_origins:
          type: array
          items:
            type: string
        login_uri:
          type:
          - string
          - 'null'
        consent_uri:
          type:
          - string
          - 'null'
        default_redirect_uri:
          type:
          - string
          - 'null'
        registration_override:
          anyOf:
          - $ref: '#/components/schemas/RegistrationConfig'
          - type: 'null'
        min_sdk_version:
          type:
          - string
          - 'null'
        token_profile:
          type:
          - string
          - 'null'
    RegistrationConfig:
      type: object
      properties:
        mode:
          type: string
          enum:
          - open
          - invite_only
          - request_access
          - closed
    PublicConfig:
      type: object
      properties:
        project:
          type: object
          properties:
            name:
              type: string
            branding:
              type: object
              additionalProperties: true
        registration:
          $ref: '#/components/schemas/RegistrationConfig'
        methods:
          type: array
          items:
            type: string
        providers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
        password_policy:
          type: object
          additionalProperties: true
        mfa_policy:
          type: object
          additionalProperties: true
        features:
          type: object
          additionalProperties:
            type: boolean
        locales:
          type: array
          items:
            type: string
        default_locale:
          type: string
    WebAuthnCredential:
      type: object
      properties:
        id:
          type: string
          example: cred_1
        name:
          type: string
        created_at:
          $ref: '#/components/schemas/Timestamp'
        last_used_at:
          $ref: '#/components/schemas/Timestamp'
    ActivityEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          example: session.created
        ip:
          type:
          - string
          - 'null'
        device:
          type:
          - string
          - 'null'
        at:
          $ref: '#/components/schemas/Timestamp'
    ServiceAccount:
      type: object
      properties:
        id:
          type: string
          example: sa_ci
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        disabled:
          type: boolean
    ApiKey:
      type: object
      properties:
        id:
          type: string
          example: key_3
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        prefix:
          type: string
        disabled:
          type: boolean
        expires_at:
          $ref: '#/components/schemas/Timestamp'
    SSOConnection:
      type: object
      properties:
        id:
          type: string
          example: sso_1
        type:
          type: string
          enum:
          - saml
          - oidc
        name:
          type: string
        status:
          type: string
        domains:
          type: array
          items:
            type: string
        external_ref:
          type:
          - string
          - 'null'
        config:
          type: object
          additionalProperties: true
        attribute_mapping:
          type: object
          additionalProperties: true
        sp_metadata_url:
          type:
          - string
          - 'null'
    Domain:
      type: object
      properties:
        id:
          type: string
          example: dom_1
        domain:
          type: string
        status:
          type: string
          enum:
          - pending
          - verified
        connection_id:
          type:
          - string
          - 'null'
        verified_at:
          $ref: '#/components/schemas/Timestamp'
    Project:
      type: object
      properties:
        id:
          type: string
          example: prj_7Fk2
        name:
          type: string
        slug:
          type: string
        default_locale:
          type: string
        supported_locales:
          type: array
          items:
            type: string
        feature_gates:
          type: object
          additionalProperties:
            type: boolean
        environments:
          type: array
          items:
            type: string
        created_at:
          $ref: '#/components/schemas/Timestamp'
    Environment:
      type: object
      properties:
        name:
          type: string
        project_id:
          type: string
        issuer:
          type: string
        created_at:
          $ref: '#/components/schemas/Timestamp'
    Webhook:
      type: object
      properties:
        id:
          type: string
          example: wh_1
        url:
          type: string
        events:
          type: array
          items:
            type: string
        enabled:
          type: boolean
    Hook:
      type: object
      properties:
        id:
          type: string
          example: hk_1
        type:
          type: string
          enum:
          - before_sign_in
          - before_token_issue
          - before_user_create
        url:
          type: string
        timeout_ms:
          type: integer
        enabled:
          type: boolean
    Job:
      type: object
      properties:
        id:
          type: string
          example: job_imp_1
        type:
          type: string
        status:
          type: string
          enum:
          - running
          - completed
          - failed
          - cancelled
        progress:
          type: object
          properties:
            total:
              type: integer
            processed:
              type: integer
            failed:
              type: integer
        report_url:
          type:
          - string
          - 'null'
    AuditLog:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        actor_id:
          type:
          - string
          - 'null'
        target_id:
          type:
          - string
          - 'null'
        at:
          $ref: '#/components/schemas/Timestamp'
        data:
          type: object
          additionalProperties: true
    Event:
      type: object
      properties:
        id:
          type: string
          example: evt_9
        type:
          type: string
          example: user.created
        created_at:
          $ref: '#/components/schemas/Timestamp'
        project_id:
          type: string
        environment:
          type: string
        data:
          type: object
          additionalProperties: true
    SigningKey:
      type: object
      properties:
        kid:
          type: string
        alg:
          type: string
          example: RS256
        use:
          type: string
          example: sig
        status:
          type: string
          enum:
          - active
          - inactive
          - retired
        created_at:
          $ref: '#/components/schemas/Timestamp'
    TokenProfile:
      type: object
      properties:
        id:
          type: string
          example: tp_api
        name:
          type: string
        audience:
          type: string
        access_ttl:
          type: integer
        refresh_ttl:
          type: integer
        claims_template:
          type: object
          additionalProperties: true
    OAuthGrant:
      type: object
      properties:
        id:
          type: string
          example: grant_1
        client:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        scopes:
          type: array
          items:
            type: string
        granted_at:
          $ref: '#/components/schemas/Timestamp'
    AccessRequest:
      type: object
      properties:
        id:
          type: string
          example: areq_5
        email:
          type: string
        reason:
          type:
          - string
          - 'null'
        fields:
          type: object
          additionalProperties: true
        status:
          type: string
          enum:
          - pending
          - approved
          - denied
        created_at:
          $ref: '#/components/schemas/Timestamp'
    PasswordPolicy:
      type: object
      properties:
        min_length:
          type: integer
        breached_check:
          type: boolean
        history:
          type: integer
        zxcvbn_min_score:
          type: integer
    SessionPolicy:
      type: object
      properties:
        access_ttl:
          type: integer
        refresh_ttl:
          type: integer
        idle_timeout:
          type: integer
        absolute_timeout:
          type: integer
        reuse_detection:
          type: boolean
    MfaPolicy:
      type: object
      properties:
        required_for_admins:
          type: boolean
        allowed_factors:
          type: array
          items:
            type: string
        remember_device:
          type: boolean
    RateLimitRule:
      type: object
      properties:
        endpoint:
          type: string
        action:
          type: string
        limit:
          type: integer
        window_seconds:
          type: integer
        by:
          type: string
    RateLimits:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/RateLimitRule'
    RetentionPolicy:
      type: object
      properties:
        inactive_user:
          type: object
          properties:
            after_days:
              type: integer
            action:
              type: string
              enum:
              - notify
              - notify_then_suspend
              - notify_then_delete
            notify_before_days:
              type: integer
        audit_log_retention_days:
          type: integer
        event_retention_days:
          type: integer
        soft_delete_grace_days:
          type: integer
        purge_deleted_after_days:
          type: integer
    ConsentDocument:
      type: object
      properties:
        key:
          type: string
        version:
          type: string
        required:
          type: boolean
        url:
          type:
          - string
          - 'null'
      required:
      - key
      - version
    ConsentConfig:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: '#/components/schemas/ConsentDocument'
    AuthConfig:
      type: object
      properties:
        methods:
          type: array
          items:
            type: string
        registration:
          $ref: '#/components/schemas/RegistrationConfig'
        default_locale:
          type: string
        supported_locales:
          type: array
          items:
            type: string
      additionalProperties: true
    EmailProvider:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        config:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
      required:
      - type
    SmsProvider:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        config:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
      required:
      - type
    OAuthProviderConfig:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        scopes:
          type: array
          items:
            type: string
        enabled:
          type: boolean
      required:
      - provider
    RiskRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        condition:
          type: string
        action:
          type: string
          enum:
          - require_step_up
          - block
          - notify
          - allow
        enabled:
          type: boolean
      required:
      - name
    ScimUser:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
        id:
          type: string
        userName:
          type: string
        name:
          type: object
          additionalProperties: true
        emails:
          type: array
          items:
            type: object
            additionalProperties: true
        externalId:
          type: string
        active:
          type: boolean
      additionalProperties: true
    SignUpRequest:
      type: object
      properties:
        email:
          type:
          - string
          - 'null'
        phone:
          type:
          - string
          - 'null'
        password:
          type:
          - string
          - 'null'
        name:
          type:
          - string
          - 'null'
        metadata:
          type: object
          additionalProperties: true
        invitation_token:
          type:
          - string
          - 'null'
        consents:
          type: array
          items:
            $ref: '#/components/schemas/ConsentAcceptance'
        captcha_token:
          type:
          - string
          - 'null'
        test:
          type: boolean
          default: false
    PasswordSignInRequest:
      type: object
      required:
      - password
      properties:
        email:
          type:
          - string
          - 'null'
        phone:
          type:
          - string
          - 'null'
        password:
          type: string
        captcha_token:
          type:
          - string
          - 'null'
    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
    CodeExchangeRequest:
      type: object
      required:
      - grant_type
      - code
      properties:
        grant_type:
          type: string
          enum:
          - auth_code
        code:
          type: string
          example: ac_…
        code_verifier:
          type:
          - string
          - 'null'
    OtpStartRequest:
      type: object
      required:
      - identifier
      - channel
      - purpose
      properties:
        identifier:
          type: string
        channel:
          type: string
          enum:
          - email
          - sms
          - whatsapp
        purpose:
          type: string
          enum:
          - signin
          - signup
          - verify
        redirect_to:
          type:
          - string
          - 'null'
        captcha_token:
          type:
          - string
          - 'null'
    OtpVerifyRequest:
      type: object
      required:
      - challenge_id
      - code
      properties:
        challenge_id:
          type: string
        code:
          type: string
    MagicLinkStartRequest:
      type: object
      required:
      - email
      - redirect_to
      - purpose
      properties:
        email:
          type: string
        redirect_to:
          type: string
        purpose:
          type: string
          enum:
          - signin
          - signup
        captcha_token:
          type:
          - string
          - 'null'
    MagicLinkVerifyRequest:
      type: object
      required:
      - token
      properties:
        token:
          type: string
    PasswordForgotRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
        redirect_to:
          type:
          - string
          - 'null'
        locale:
          type:
          - string
          - 'null'
        captcha_token:
          type:
          - string
          - 'null'
    PasswordResetRequest:
      type: object
      required:
      - new_password
      properties:
        token:
          type:
          - string
          - 'null'
        challenge_id:
          type:
          - string
          - 'null'
        code:
          type:
          - string
          - 'null'
        new_password:
          type: string
    PasswordChangeRequest:
      type: object
      required:
      - new_password
      properties:
        current_password:
          type:
          - string
          - 'null'
        new_password:
          type: string
        revoke_other_sessions:
          type: boolean
          default: false
    OkResult:
      allOf:
      - $ref: '#/components/schemas/Ok'
      - type: object
        required:
        - result_type
        properties:
          result_type:
            type: string
            enum:
            - ok
    UserUpdatedResult:
      type: object
      required:
      - result_type
      - user
      properties:
        result_type:
          type: string
          enum:
          - user_updated
        user:
          $ref: '#/components/schemas/User'
    StepUpResult:
      oneOf:
      - $ref: '#/components/schemas/AuthNextStep'
      - $ref: '#/components/schemas/OkResult'
      discriminator:
        propertyName: result_type
        mapping:
          next_step: '#/components/schemas/AuthNextStep'
          ok: '#/components/schemas/OkResult'
    PhoneVerifyResult:
      oneOf:
      - $ref: '#/components/schemas/AuthResult'
      - $ref: '#/components/schemas/UserUpdatedResult'
      discriminator:
        propertyName: result_type
        mapping:
          authenticated: '#/components/schemas/AuthResult'
          user_updated: '#/components/schemas/UserUpdatedResult'
    PushedAuthorizationRequest:
      type: object
      required:
      - client_id
      - response_type
      properties:
        response_type:
          type: string
          example: code
        client_id:
          type: string
        redirect_uri:
          type: string
          format: uri
        scope:
          type: string
          example: openid profile
        state:
          type: string
        code_challenge:
          type: string
        code_challenge_method:
          type: string
          enum:
          - S256
          - plain
        nonce:
          type: string
        response_mode:
          type: string
        prompt:
          type: string
        login_hint:
          type: string
        request:
          type: string
          description: Request object JWT (RFC 9101).
        client_assertion_type:
          type: string
        client_assertion:
          type: string
paths:
  /v1/health:
    get:
      operationId: getV1Health
      x-since: 1.0.0
      tags:
      - System
      summary: Aggregate healthcheck.
      security: []
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  time:
                    $ref: '#/components/schemas/Timestamp'
                  version:
                    type: string
      x-audience: runtime
      x-scopes: []
  /v1/health/live:
    get:
      operationId: getV1HealthLive
      x-since: 1.0.0
      tags:
      - System
      summary: Liveness probe.
      security: []
      responses:
        '200':
          description: Process up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
      x-audience: runtime
      x-scopes: []
  /v1/health/ready:
    get:
      operationId: getV1HealthReady
      x-since: 1.0.0
      tags:
      - System
      summary: Readiness probe.
      security: []
      responses:
        '200':
          description: Dependencies reachable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  checks:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      x-audience: runtime
      x-scopes: []
  /v1/config/public:
    get:
      operationId: getV1ConfigPublic
      x-since: 1.0.0
      tags:
      - System
      summary: Public bootstrap config.
      description: Unauthenticated; resolved per app client via `X-Client-Id`.
      security: []
      parameters:
      - $ref: '#/components/parameters/XClientId'
      responses:
        '200':
          description: Public config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicConfig'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/csrf:
    get:
      operationId: getV1Csrf
      x-since: 1.0.0
      tags:
      - System
      summary: Issue a CSRF token (cookie mode).
      security: []
      parameters:
      - $ref: '#/components/parameters/XClientId'
      responses:
        '200':
          description: CSRF token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrf_token:
                    type: string
                    example: csrf_…
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/sign-up:
    post:
      operationId: postV1AuthSignUp
      x-since: 1.0.0
      tags:
      - Core Auth
      summary: Register a user.
      security: []
      parameters:
      - $ref: '#/components/parameters/XClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '200':
          description: Authenticated; verification may be pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/sign-in/password:
    post:
      operationId: postV1AuthSignInPassword
      x-since: 1.0.0
      tags:
      - Core Auth
      summary: Sign in with password.
      security: []
      parameters:
      - $ref: '#/components/parameters/XClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordSignInRequest'
      responses:
        '200':
          description: AuthResult or an MFA next-step.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResultOrNextStep'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/token/refresh:
    post:
      operationId: postV1AuthTokenRefresh
      x-since: 1.0.0
      tags:
      - Core Auth
      summary: Rotate refresh token, issue new access token.
      security: []
      parameters:
      - $ref: '#/components/parameters/XClientId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New AuthResult.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/token/exchange:
    post:
      operationId: postV1AuthTokenExchange
      x-since: 1.0.0
      tags:
      - Core Auth
      summary: Exchange a browser-flow auth_code for a session.
      security: []
      parameters:
      - $ref: '#/components/parameters/XClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeExchangeRequest'
      responses:
        '200':
          description: AuthResult.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '400':
          $ref: '#/components/responses/BadRequest'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/sign-out:
    post:
      operationId: postV1AuthSignOut
      x-since: 1.0.0
      tags:
      - Core Auth
      summary: Revoke the current session.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                everywhere:
                  type: boolean
                  default: false
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/sign-out-all:
    post:
      operationId: postV1AuthSignOutAll
      x-since: 1.0.0
      tags:
      - Core Auth
      summary: Revoke all of the user's sessions.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                except_current:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Revoked count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked_count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/session:
    get:
      operationId: getV1AuthSession
      x-since: 1.0.0
      tags:
      - Core Auth
      summary: Get current session and user.
      responses:
        '200':
          description: Session + user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  session:
                    $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/session/switch-group:
    post:
      operationId: postV1AuthSessionSwitchGroup
      x-since: 1.0.0
      tags:
      - Core Auth
      summary: Set active group, re-issue token (optional seam).
      description: Re-issues a token with a new active-group claim. Membership is validated externally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - group_id
              properties:
                group_id:
                  type: string
      responses:
        '200':
          description: New AuthResult.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/session/step-up:
    post:
      operationId: postV1AuthSessionStepUp
      x-since: 1.0.0
      tags:
      - Core Auth
      summary: Begin step-up authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - purpose
              properties:
                purpose:
                  type: string
                  example: delete_account
                required_aal:
                  type: integer
                  enum:
                  - 1
                  - 2
                max_age_seconds:
                  type:
                  - integer
                  - 'null'
      responses:
        '200':
          description: A next-step, or ok if already satisfied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepUpResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/guest:
    post:
      operationId: postV1AuthGuest
      x-since: 1.0.0
      tags:
      - Core Auth
      summary: Create an anonymous guest user and session.
      security: []
      parameters:
      - $ref: '#/components/parameters/XClientId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: AuthResult with a guest user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/email/verification/start:
    post:
      operationId: postV1AuthEmailVerificationStart
      x-since: 1.0.0
      tags:
      - Verification
      summary: Send an email verification challenge.
      security: []
      parameters:
      - $ref: '#/components/parameters/XClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                redirect_to:
                  type:
                  - string
                  - 'null'
                locale:
                  type:
                  - string
                  - 'null'
      responses:
        '200':
          description: Challenge created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Challenge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/email/verification/verify:
    post:
      operationId: postV1AuthEmailVerificationVerify
      x-since: 1.0.0
      tags:
      - Verification
      summary: Verify email by code or token.
      security: []
      parameters:
      - $ref: '#/components/parameters/XClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                challenge_id:
                  type:
                  - string
                  - 'null'
                code:
                  type:
                  - string
                  - 'null'
                token:
                  type:
                  - string
                  - 'null'
      responses:
        '200':
          description: Verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/email/verification/callback:
    get:
      operationId: getV1AuthEmailVerificationCallback
      x-since: 1.0.0
      tags:
      - Verification
      summary: Email link callback (redirects with code).
      security: []
      parameters:
      - name: token
        in: query
        required: true
        schema:
          type: string
      - name: redirect_to
        in: query
        required: false
        schema:
          type: string
      responses:
        '302':
          description: Redirect to product with auth code.
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: Redirect target.
            Set-Cookie:
              schema:
                type: string
              description: Session cookies, in cookie mode.
      x-audience: runtime
      x-scopes:
      - project
      - environment
  /v1/auth/email/change/start:
    post:
      operationId: postV1AuthEmailChangeStart
      x-since: 1.0.0
      tags:
      - Verification
      summary: Start an email change (step-up; notifies old address).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - new_email
              properties:
                new_email:
                  type: string
                redirect_to:
                  type:
                  - string
