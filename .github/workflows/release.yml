name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  docker:
    name: Docker image
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalize version
        id: version
        run: echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest

  npm:
    name: npm package
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: ts/yarn.lock
          registry-url: "https://npm.pkg.github.com"
          scope: "@gopherex"

      - name: Normalize version
        run: echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Verify package version
        run: |
          actual="$(node -p "require('./packages/sdk/package.json').version")"
          test "$actual" = "$VERSION" || {
            echo "package version $actual does not match tag version $VERSION"
            exit 1
          }
        working-directory: ts

      - name: Build package
        run: |
          yarn install --frozen-lockfile
          yarn generate
          yarn workspace @gopherex/iam-sdk typecheck
          yarn build
        working-directory: ts

      - name: Publish @gopherex/iam-sdk
        run: npm publish
        working-directory: ts/packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
