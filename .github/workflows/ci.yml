name: CI

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - master

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@a26aa6937d212e703925e98609e10c4a6c3f9414 # v5
        with:
          python-version: '3.x'

      - name: Install OpenAPI validator
        run: python -m pip install openapi-spec-validator

      - name: Validate OpenAPI
        run: make validate

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags=integration ./... -count=1 -p 1

  frontend:
    name: TypeScript and Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            ts/yarn.lock
            web/yarn.lock

      - name: Generate and build SDK
        run: |
          yarn install --frozen-lockfile
          yarn generate
          yarn build
        working-directory: ts

      - name: Build admin SPA
        run: |
          yarn install --frozen-lockfile
          yarn build
        working-directory: web
