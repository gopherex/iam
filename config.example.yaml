# IAM service configuration (config.yaml). Loaded from $CONFIG_PATH or ./.
# Every key can be overridden by its UPPER_SNAKE_CASE env var, e.g.
# INFRA_POSTGRES_PASSWORD, SERVICE_HTTP_ADDR. Defaults are shown.
infra:
  postgres:
    host: localhost
    port: 5432
    username: iam
    password: iam
    database: iam
    sslmode: disable          # disable | require | verify-ca | verify-full
    log_level: info           # debug | info | warn | error

service:
  http:
    addr: ":8080"
    probe_addr: ":8081"       # separate liveness/readiness port; set "" or =addr to mount probes under /healthz/ on the main port
    read_timeout_sec: 15
    write_timeout_sec: 30
    shutdown_sec: 15
  logger:
    level: info               # debug | info | warn | error
    format: json              # json | text
  cors:
    allowed_origins: ["*"]
  auth:
    default_environment: live
    access_ttl_sec: 1800      # 30m
    refresh_ttl_sec: 2592000  # 30d
    master_key: ""            # operator master-key credential; empty disables the masterKey scheme (set via MASTER_KEY)
    encryption_key: ""        # base64 32-byte AES-256 key; encrypts reversible secrets at rest (signing PEMs, TOTP). Empty = disabled. (SERVICE_AUTH_ENCRYPTION_KEY)
    seed_root: false          # dev: ensure a "Root" project exists on startup so the operator (master_key) has something to manage (SERVICE_AUTH_SEED_ROOT)
