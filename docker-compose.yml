# Local development environment for IAM.
# Brought up with `make dev` (docker compose up -d).

name: iam-dev

services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: iam
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iam}
    ports:
      - "${BIND_ADDR:-127.0.0.1}:5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Added when the stack is fixed: cache (redis) and mail capture (mailpit).

volumes:
  pgdata:
