# Local development environment for IAM. `docker compose up` brings up Postgres
# and the IAM server (admin SPA embedded, migrations applied, a "Root" project
# seeded) — open http://localhost:8080 and sign in with the master key below.
#
# Production runs the same image (deployments/Dockerfile) configured purely via
# IAM_* environment variables.

name: iam-dev

services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: ${IAM_INFRA_POSTGRES_DATABASE:-iam}
      POSTGRES_USER: ${IAM_INFRA_POSTGRES_USERNAME:-iam}
      POSTGRES_PASSWORD: ${IAM_INFRA_POSTGRES_PASSWORD:-iam}
    ports:
      - "${BIND_ADDR:-127.0.0.1}:5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 5

  iam:
    build:
      context: .
      dockerfile: deployments/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Config discovery. Set to a directory with config.yaml/json/toml, or to
      # an exact file path. Env values below override file values.
      CONFIG_PATH: ${CONFIG_PATH:-}

      # IAM server config: infra.postgres.*
      IAM_INFRA_POSTGRES_HOST: ${IAM_INFRA_POSTGRES_HOST:-postgres}
      IAM_INFRA_POSTGRES_PORT: ${IAM_INFRA_POSTGRES_PORT:-5432}
      IAM_INFRA_POSTGRES_USERNAME: ${IAM_INFRA_POSTGRES_USERNAME:-iam}
      IAM_INFRA_POSTGRES_PASSWORD: ${IAM_INFRA_POSTGRES_PASSWORD:-iam}
      IAM_INFRA_POSTGRES_DATABASE: ${IAM_INFRA_POSTGRES_DATABASE:-iam}
      IAM_INFRA_POSTGRES_SSLMODE: ${IAM_INFRA_POSTGRES_SSLMODE:-disable}
      IAM_INFRA_POSTGRES_LOG_LEVEL: ${IAM_INFRA_POSTGRES_LOG_LEVEL:-info}

      # IAM server config: service.http.*
      IAM_SERVICE_HTTP_ADDR: ${IAM_SERVICE_HTTP_ADDR:-:8080}
      # Compose default mounts probes on the API port for one exposed listener.
      # Set to :8081 to match the application default separate probe listener.
      IAM_SERVICE_HTTP_PROBE_ADDR: ${IAM_SERVICE_HTTP_PROBE_ADDR:-:8080}
      IAM_SERVICE_HTTP_READ_TIMEOUT_SEC: ${IAM_SERVICE_HTTP_READ_TIMEOUT_SEC:-15}
      IAM_SERVICE_HTTP_WRITE_TIMEOUT_SEC: ${IAM_SERVICE_HTTP_WRITE_TIMEOUT_SEC:-30}
      IAM_SERVICE_HTTP_SHUTDOWN_SEC: ${IAM_SERVICE_HTTP_SHUTDOWN_SEC:-15}

      # IAM server config: service.logger.*
      IAM_SERVICE_LOGGER_LEVEL: ${IAM_SERVICE_LOGGER_LEVEL:-info}
      IAM_SERVICE_LOGGER_FORMAT: ${IAM_SERVICE_LOGGER_FORMAT:-text}
      XLOG_PRETTY: ${XLOG_PRETTY:-}

      # IAM server config: service.cors.*
      # Empty means no browser origins. Use "*" or a comma-separated list.
      IAM_SERVICE_CORS_ALLOWED_ORIGINS: ${IAM_SERVICE_CORS_ALLOWED_ORIGINS:-}

      # IAM server config: service.auth.*
      IAM_SERVICE_AUTH_DEFAULT_ENVIRONMENT: ${IAM_SERVICE_AUTH_DEFAULT_ENVIRONMENT:-live}
      IAM_SERVICE_AUTH_ACCESS_TTL_SEC: ${IAM_SERVICE_AUTH_ACCESS_TTL_SEC:-1800}
      IAM_SERVICE_AUTH_REFRESH_TTL_SEC: ${IAM_SERVICE_AUTH_REFRESH_TTL_SEC:-2592000}
      # Dev: seed a Root project and sign in with this master key.
      IAM_SERVICE_AUTH_MASTER_KEY: ${IAM_SERVICE_AUTH_MASTER_KEY:-dev}
      # Dev-only fallback key: base64("0123456789abcdef0123456789abcdef").
      IAM_SERVICE_AUTH_ENCRYPTION_KEY: ${IAM_SERVICE_AUTH_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      IAM_SERVICE_AUTH_SEED_ROOT: ${IAM_SERVICE_AUTH_SEED_ROOT:-true}

      # OpenTelemetry/xtrace resource config.
      # service.name/version/instance.id are set by the binary from build metadata;
      # these vars remain useful for extra resource attributes.
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}

      # OpenTelemetry/xtrace OTLP HTTP exporter config. Empty values are treated
      # as unset by the OTel SDK.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-}
      OTEL_EXPORTER_OTLP_TRACES_INSECURE: ${OTEL_EXPORTER_OTLP_TRACES_INSECURE:-}
      OTEL_EXPORTER_OTLP_METRICS_INSECURE: ${OTEL_EXPORTER_OTLP_METRICS_INSECURE:-}
      OTEL_EXPORTER_OTLP_LOGS_INSECURE: ${OTEL_EXPORTER_OTLP_LOGS_INSECURE:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_EXPORTER_OTLP_TRACES_HEADERS: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:-}
      OTEL_EXPORTER_OTLP_METRICS_HEADERS: ${OTEL_EXPORTER_OTLP_METRICS_HEADERS:-}
      OTEL_EXPORTER_OTLP_LOGS_HEADERS: ${OTEL_EXPORTER_OTLP_LOGS_HEADERS:-}
      OTEL_EXPORTER_OTLP_TIMEOUT: ${OTEL_EXPORTER_OTLP_TIMEOUT:-}
      OTEL_EXPORTER_OTLP_TRACES_TIMEOUT: ${OTEL_EXPORTER_OTLP_TRACES_TIMEOUT:-}
      OTEL_EXPORTER_OTLP_METRICS_TIMEOUT: ${OTEL_EXPORTER_OTLP_METRICS_TIMEOUT:-}
      OTEL_EXPORTER_OTLP_LOGS_TIMEOUT: ${OTEL_EXPORTER_OTLP_LOGS_TIMEOUT:-}
      OTEL_EXPORTER_OTLP_COMPRESSION: ${OTEL_EXPORTER_OTLP_COMPRESSION:-}
      OTEL_EXPORTER_OTLP_TRACES_COMPRESSION: ${OTEL_EXPORTER_OTLP_TRACES_COMPRESSION:-}
      OTEL_EXPORTER_OTLP_METRICS_COMPRESSION: ${OTEL_EXPORTER_OTLP_METRICS_COMPRESSION:-}
      OTEL_EXPORTER_OTLP_LOGS_COMPRESSION: ${OTEL_EXPORTER_OTLP_LOGS_COMPRESSION:-}
      OTEL_EXPORTER_OTLP_CERTIFICATE: ${OTEL_EXPORTER_OTLP_CERTIFICATE:-}
      OTEL_EXPORTER_OTLP_TRACES_CERTIFICATE: ${OTEL_EXPORTER_OTLP_TRACES_CERTIFICATE:-}
      OTEL_EXPORTER_OTLP_METRICS_CERTIFICATE: ${OTEL_EXPORTER_OTLP_METRICS_CERTIFICATE:-}
      OTEL_EXPORTER_OTLP_LOGS_CERTIFICATE: ${OTEL_EXPORTER_OTLP_LOGS_CERTIFICATE:-}
      OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE: ${OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE:-}
      OTEL_EXPORTER_OTLP_TRACES_CLIENT_CERTIFICATE: ${OTEL_EXPORTER_OTLP_TRACES_CLIENT_CERTIFICATE:-}
      OTEL_EXPORTER_OTLP_METRICS_CLIENT_CERTIFICATE: ${OTEL_EXPORTER_OTLP_METRICS_CLIENT_CERTIFICATE:-}
      OTEL_EXPORTER_OTLP_LOGS_CLIENT_CERTIFICATE: ${OTEL_EXPORTER_OTLP_LOGS_CLIENT_CERTIFICATE:-}
      OTEL_EXPORTER_OTLP_CLIENT_KEY: ${OTEL_EXPORTER_OTLP_CLIENT_KEY:-}
      OTEL_EXPORTER_OTLP_TRACES_CLIENT_KEY: ${OTEL_EXPORTER_OTLP_TRACES_CLIENT_KEY:-}
      OTEL_EXPORTER_OTLP_METRICS_CLIENT_KEY: ${OTEL_EXPORTER_OTLP_METRICS_CLIENT_KEY:-}
      OTEL_EXPORTER_OTLP_LOGS_CLIENT_KEY: ${OTEL_EXPORTER_OTLP_LOGS_CLIENT_KEY:-}
    ports:
      - "${BIND_ADDR:-127.0.0.1}:8080:8080"

  # Added when the stack is fixed: cache (redis) and mail capture (mailpit).

volumes:
  pgdata:
